<div class="page-container">
  <h1>Futbolines Profesionales</h1>
  <p class="subtitle">Futbolines de mesa de la mejor calidad</p>

  <div class="products-grid">
    <article class="product-card">
      <div class="product-image">
        <img [src]="img1 || 'https://media.cgtrader.com/variants/871ZYHo1TMTHMDNHgR9VTsBT/78add9c2f02fbd73a43ffb3970be38683c5f15eff6ca849dc78c644f4ff9ce1b/001.webp'" alt="Producto" style="width: 100%; border-radius: 8px; aspect-ratio: 4/3; object-fit: cover;" />
      </div>
      <div class="image-url-row">
        <input #imgUrl1 type="text" (input)="img1 = imgUrl1.value" placeholder="Pega URL de la imagen" class="image-url-input" />
        <button type="button" class="copy-btn" (click)="copy(imgUrl1.value)">Copiar URL</button>
      </div>
      <h3>Futbolín Modelo Premium</h3>
      <p class="price">299,99 €</p>
      <button class="btn-add">Agregar al carrito</button>
    </article>

    <article class="product-card">
      <div class="product-image">
        <img [src]="img2 || 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSffKB_Y1iCYr4x3pVytX4K0n8WJ1-9d5dhmg&s'" alt="Producto" style="width: 100%; border-radius: 8px; aspect-ratio: 4/3; object-fit: cover;" />
      </div>
      <div class="image-url-row">
        <input #imgUrl2 type="text" (input)="img2 = imgUrl2.value" placeholder="Pega URL de la imagen" class="image-url-input" />
        <button type="button" class="copy-btn" (click)="copy(imgUrl2.value)">Copiar URL</button>
      </div>
      <h3>Futbolín Modelo Profesional</h3>
      <p class="price">449,99 €</p>
      <button class="btn-add">Agregar al carrito</button>
    </article>

    <article class="product-card">
      <div class="product-image">
        <img [src]="img3 || 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSEpcuOngjGvBcMFwVt9BGi7STQAe2ypMQsrQ&s'" alt="Producto" style="width: 100%; border-radius: 8px; aspect-ratio: 4/3; object-fit: cover;" />
      </div>
      <div class="image-url-row">
        <input #imgUrl3 type="text" (input)="img3 = imgUrl3.value" placeholder="Pega URL de la imagen" class="image-url-input" />
        <button type="button" class="copy-btn" (click)="copy(imgUrl3.value)">Copiar URL</button>
      </div>
      <h3>Futbolín Modelo Competición</h3>
      <p class="price">599,99 €</p>
      <button class="btn-add">Agregar al carrito</button>
    </article>
  </div>
</div>
