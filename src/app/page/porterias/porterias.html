<div class="page-container">
  <h1>Porterías y Juegos de Tiro</h1>
  <p class="subtitle">Entrena tu puntería con nuestras porterías</p>

  <div class="products-grid">
    <article class="product-card">
      <div class="product-image">
        <img [src]="img1 || 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRiqDXOin16Km2v_VXP0qylsg59BtG9gfsfkg&s'" alt="Portería Infantil" style="width: 100%; border-radius: 8px; aspect-ratio: 4/3; object-fit: cover;" />
      </div>
      <div class="image-url-row">
        <input #imgUrl1 type="text" (input)="img1 = imgUrl1.value" placeholder="Pega URL de la imagen" class="image-url-input" />
        <button type="button" class="copy-btn" (click)="copy(imgUrl1.value)">Copiar URL</button>
      </div>
      <h3>Portería Infantil</h3>
      <p class="price">59,99 €</p>
      <button class="btn-add">Agregar al carrito</button>
    </article>

    <article class="product-card">
      <div class="product-image">
        <img [src]="img2 || 'https://images.unsplash.com/photo-1614632537190-23e4146777db?q=80&w=400&auto=format&fit=crop'" alt="Portería Estándar" style="width: 100%; border-radius: 8px; aspect-ratio: 4/3; object-fit: cover;" />
      </div>
      <div class="image-url-row">
        <input #imgUrl2 type="text" (input)="img2 = imgUrl2.value" placeholder="Pega URL de la imagen" class="image-url-input" />
        <button type="button" class="copy-btn" (click)="copy(imgUrl2.value)">Copiar URL</button>
      </div>
      <h3>Portería Estándar</h3>
      <p class="price">99,99 €</p>
      <button class="btn-add">Agregar al carrito</button>
    </article>

    <article class="product-card">
      <div class="product-image">
        <img [src]="img3 || 'https://sportmaster.mx/wp-content/uploads/porterias-futbol-7.jpg'" alt="Portería Profesional" style="width: 100%; border-radius: 8px; aspect-ratio: 4/3; object-fit: cover;" />
      </div>
      <div class="image-url-row">
        <input #imgUrl3 type="text" (input)="img3 = imgUrl3.value" placeholder="Pega URL de la imagen" class="image-url-input" />
        <button type="button" class="copy-btn" (click)="copy(imgUrl3.value)">Copiar URL</button>
      </div>
      <h3>Portería Profesional</h3>
      <p class="price">199,99 €</p>
      <button class="btn-add">Agregar al carrito</button>
    </article>
  </div>
</div>
