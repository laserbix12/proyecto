<div class="contenedor-productos">

  <div class="tarjeta-producto" *ngFor="let producto of productos">

    <img [src]="producto.imagen || 'https://via.placeholder.com/150'" alt="Imagen de {{ producto.nombre }}">

    <h3>{{ producto.nombre }}</h3>
    <p>Precio: €{{ producto.precio }}</p>

    <button class="btn-comprar" (click)="comprar(producto)">Añadir al carrito</button>
  </div>

</div>
